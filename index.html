<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>異動促銷追蹤</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;background:#f5f5f3;color:#1a1a18;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:20px 16px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.hd h1{font-size:18px;font-weight:700}
.today-lbl{font-size:12px;color:#888}
.al-sec{margin-bottom:18px}
.al-lbl{font-size:12px;font-weight:600;color:#555;display:flex;align-items:center;gap:6px;margin-bottom:7px;margin-top:12px}
.al-lbl:first-child{margin-top:0}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-r{background:#e24b4a;animation:blink 1.4s infinite}
.dot-a{background:#ef9f27;animation:blink 1.4s .3s infinite}
.dot-o{background:#f97316;animation:blink 1s infinite}
.dot-p{background:#9333ea;animation:blink 1.2s .2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.al-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-bottom:4px}
.ac{border-radius:10px;padding:12px 14px;border-left:4px solid;cursor:pointer;transition:.15s;user-select:none}
.ac:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12)}
.ac-r{background:#fcebeb;border-color:#e24b4a}
.ac-a{background:#faeeda;border-color:#ef9f27}
.ac-o{background:#fff4f0;border-color:#f97316}
.ac-p{background:#f9f0ff;border-color:#9333ea}
.ac-tag{font-size:10px;font-weight:700;letter-spacing:.4px;margin-bottom:3px}
.ac-r .ac-tag{color:#a32d2d}
.ac-a .ac-tag{color:#854f0b}
.ac-o .ac-tag{color:#c2410c}
.ac-p .ac-tag{color:#7e22ce}
.ac-title{font-size:13px;font-weight:600;color:#1a1a18}
.ac-sub{font-size:11px;color:#777;margin-top:2px}
.ac-hint{font-size:11px;font-style:italic;margin-top:4px}
.ac-r .ac-hint{color:#a32d2d}
.ac-a .ac-hint{color:#854f0b}
.ac-o .ac-hint{color:#c2410c}
.ac-p .ac-hint{color:#7e22ce}
.dn-row{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.dn{padding:6px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#666;transition:.15s;display:flex;flex-direction:column;align-items:center;min-width:58px}
.dn:hover{border-color:#aaa}
.dn.on{background:#1a1a18;color:#fff;border-color:#1a1a18;font-weight:600}
.dn.past{color:#aaa;border-color:#e5e5e5}
.dn.past.on{background:#888;border-color:#888;color:#fff}
.dn.fut{color:#3b6d11;border-color:#c8e6a0}
.dn.fut.on{background:#639922;border-color:#639922;color:#fff}
.dn-d{font-size:14px;font-weight:600;line-height:1.2}
.dn-l{font-size:10px;opacity:.75;margin-top:1px}
.st-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.st{background:#fff;border:1px solid #e2e0d8;border-radius:8px;padding:8px 14px;display:flex;align-items:baseline;gap:6px}
.st-n{font-size:20px;font-weight:700}
.st-l{font-size:11px;color:#888}
.st.s1 .st-n{color:#1a1a18}
.st.s2 .st-n{color:#555}
.st.s3 .st-n{color:#185fa5}
.st.s4 .st-n{color:#c2410c}
.st.s5 .st-n{color:#3b6d11}
.st.s6 .st-n{color:#a32d2d}
.st.s7 .st-n{color:#854f0b}
.ctrl{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.srch{padding:5px 12px;border:1px solid #ddd;border-radius:20px;font-size:13px;outline:none;min-width:140px;background:#fff}
.srch:focus{border-color:#378add}
.fts{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:4px 11px;border:1.5px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#666;transition:.15s}
.fb.on.fa{background:#1a1a18;color:#fff;border-color:#1a1a18}
.fb.on.ff{background:#f1efe8;color:#333;border-color:#999}
.fb.on.f2{background:#e6f1fb;color:#185fa5;border-color:#378add}
.fb.on.f1{background:#fff0e6;color:#c2410c;border-color:#f97316}
.fb.on.fn{background:#eaf3de;color:#3b6d11;border-color:#639922}
.fb.on.fd{background:#fcebeb;color:#a32d2d;border-color:#e24b4a}
.fb.on.fc{background:#faeeda;color:#854f0b;border-color:#ef9f27}
.card{background:#fff;border:1px solid #e2e0d8;border-radius:10px;overflow:hidden;margin-bottom:10px}
.card-hd{padding:10px 14px;background:#f9f9f7;border-bottom:1px solid #e2e0d8;display:flex;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-hd:hover{background:#f2f2ef}
.cat-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.ct-f{background:#faeeda;color:#854f0b}
.ct-g{background:#e6f1fb;color:#185fa5}
.ct-s{background:#eaf3de;color:#3b6d11}
.ct-o{background:#f1efe8;color:#5f5e5a}
.card-title{font-size:13px;font-weight:600;color:#1a1a18}
.card-cnt{margin-left:auto;font-size:12px;color:#888;white-space:nowrap}
.card-body{display:none}
.card-body.open{display:block}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
th{padding:7px 11px;text-align:left;font-size:11px;font-weight:600;color:#888;border-bottom:1px solid #e2e0d8;background:#f9f9f7;white-space:nowrap}
td{padding:7px 11px;border-bottom:1px solid #f0efeb;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
tr.rn td{background:#f2fae8}
tr.rd td{background:#fff4f4;opacity:.75}
tr.rc td{background:#fffbf0}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.bd{background:#fcebeb;color:#a32d2d}
.bu{background:#faeeda;color:#854f0b}
.bs{background:#f1efe8;color:#5f5e5a}
.b2{background:#e6f1fb;color:#185fa5;font-weight:700}
.b1{background:#fff0e6;color:#c2410c;font-weight:700}
.bn{background:#eaf3de;color:#3b6d11}
.bdl{background:#fcebeb;color:#a32d2d}
.bch{background:#faeeda;color:#854f0b}
.bx{background:#f1efe8;color:#5f5e5a}
.bgs{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.dn2{font-size:11px;color:#aaa}
.empty{padding:36px;text-align:center;color:#aaa}
.noact{padding:20px;text-align:center;color:#bbb;font-size:13px;background:#fff;border:1px solid #e2e0d8;border-radius:10px}
.cmp-z{margin-top:24px;border-top:1px solid #e2e0d8;padding-top:16px}
.cmp-t{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#888;user-select:none;margin-bottom:10px}
.cmp-b{display:none}
.cmp-b.open{display:block}
.cmp-fs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.cf{padding:5px 13px;border:1px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#666}
.cf.on{background:#378add;color:#fff;border-color:#378add;font-weight:600}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:780px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhd{display:flex;align-items:flex-start;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #e2e0d8;gap:10px}
.mt{font-size:15px;font-weight:700}
.ms{font-size:12px;color:#888;margin-top:2px}
.mx{cursor:pointer;font-size:24px;color:#aaa;line-height:1;flex-shrink:0}
.mx:hover{color:#333}
.mb{overflow-y:auto}

@media (max-width: 768px) {
  .app { padding: 12px 10px; }

  /* 日期導覽 */
  .dn-row { gap: 5px; }
  .dn { min-width: 46px; padding: 5px 8px; font-size: 12px; }
  .dn-d { font-size: 13px; }
  .dn-l { font-size: 9px; }

  /* 統計列 */
  .st-row { gap: 6px; }
  .st { padding: 7px 10px; }
  .st-n { font-size: 17px; }
  .st-l { font-size: 10px; }

  /* 篩選器 */
  .ctrl { gap: 5px; }
  .srch { min-width: 100%; font-size: 13px; }
  .fts { display: flex; flex-wrap: wrap; gap: 5px; }
  .fb { padding: 5px 10px; font-size: 12px; min-height: 34px; }

  /* 活動卡片 */
  .card { margin-bottom: 8px; }
  .card-hd { padding: 10px 12px; gap: 5px; }
  .cat-tag { font-size: 10px; padding: 2px 6px; }
  .card-title { font-size: 13px; }
  .card-cnt { font-size: 11px; }
  .badge { font-size: 10px; padding: 2px 5px; }

  /* 表格：隱藏次要欄，保留重點 */
  table { table-layout: auto; }
  th:nth-child(1), td:nth-child(1) { display: none; }
  th:nth-child(2), td:nth-child(2) { display: none; }
  th:nth-child(3), td:nth-child(3) { width: 72px; font-size: 10px; }
  th:nth-child(4), td:nth-child(4) { }
  th:nth-child(5), td:nth-child(5) { width: 44px; font-size: 11px; }
  th:nth-child(6), td:nth-child(6) { width: 44px; font-size: 11px; }
  th:nth-child(7), td:nth-child(7) { width: 90px; }
  td { padding: 6px 7px; font-size: 12px; }
  th { padding: 6px 7px; font-size: 10px; }
  .bgs { flex-direction: column; gap: 2px; }

  /* 提醒卡片 */
  .al-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
  .ac { padding: 10px 11px; }
  .ac-tag { font-size: 10px; }
  .ac-title { font-size: 12px; }
  .ac-sub { font-size: 10px; }
  .ac-hint { font-size: 10px; }

  /* 比對基準 */
  .cmp-z { margin-top: 16px; padding-top: 12px; }
  .cmp-fs { gap: 5px; }
  .cf { padding: 5px 11px; font-size: 12px; }

  /* Modal */
  .modal { max-height: 90vh; margin: 0; border-radius: 12px 12px 0 0; }
  .mbg { align-items: flex-end; padding: 0; }
  .mhd { padding: 12px 14px; }
  .mt { font-size: 14px; }
  .ms { font-size: 11px; }
}

@media (max-width: 400px) {
  .dn { min-width: 40px; padding: 4px 5px; }
  .dn-d { font-size: 12px; }
  .al-grid { grid-template-columns: 1fr; }
  .fts .fb:nth-child(n+7) { display: none; }
}

tr.rds td{background:#fff5f5}
tr.rd1 td{background:#ffeaea}

      <div id="histarea"></div>
    </div>
  </div>
</div>

  </div>
</div>

function getActs(dk){
  var r=[],seen={};
  var todayStr=TODAY.getFullYear()+'-'+String(TODAY.getMonth()+1).padStart(2,'0')+'-'+String(TODAY.getDate()).padStart(2,'0');
  Object.keys(ALL).forEach(function(fd){
    var cats=(ALL[fd]['降價']||ALL[fd]);
    Object.keys(cats).forEach(function(cat){
      if(cat==='調價')return;
      cats[cat].forEach(function(sec,idx){
        if(sec.startDate!==dk)return;
        var uid=cat+'|'+(sec.label||'')+'|'+(sec.period||'');
        if(seen[uid])return;seen[uid]=1;
        r.push({cat:cat,sec:sec,idx:idx,fd:fd,isAdj:false});
      });
    });
    // DM 商品
    var dmArr=(ALL[fd]['DM']||[]);
    dmArr.forEach(function(sec,idx){
      if(sec.startDate!==dk)return;
      if(sec.endDate&&sec.endDate<todayStr)return;
      var uid='DM|'+(sec.label||'')+'|'+(sec.period||'');
      if(seen[uid])return;seen[uid]=1;
      r.push({cat:'DM',sec:sec,idx:idx,fd:fd,isAdj:false,isDM:true});
    });

    // 調價（無截止日者，生效後 30 天自動隱藏）
    var adjArr=(ALL[fd]['調價']||[]);
    var ADJ_AUTO_HIDE=30;
    adjArr.forEach(function(sec,idx){
      if(sec.startDate!==dk)return;
      // 有截止日：正常顯示；無截止日：超過 30 天則隱藏
      if(!sec.endDate||sec.endDate===sec.startDate){
        var sd=toD(sec.startDate);
        if(sd && dd(TODAY,sd)>ADJ_AUTO_HIDE) return;
      }
      var uid='調價|'+(sec.startDate||'');
      if(seen[uid])return;seen[uid]=1;
      r.push({cat:'調價',sec:sec,idx:idx,fd:fd,isAdj:true});
    });
  });
  return r;
}

function getDiff(rows,cmpR){
  if(!cmpR||!cmpR.length)return rows.map(function(r){return Object.assign({},r,{diff:'same'});});
  var m={};cmpR.forEach(function(r){m[r.sku||r.name]=r;});
  return rows.map(function(r){
    var k=r.sku||r.name,p=m[k];
    if(!p)return Object.assign({},r,{diff:'new'});
    if(p.promo!==r.promo||p.orig!==r.orig)return Object.assign({},r,{diff:'chg',prevOrig:p.orig,prevPromo:p.promo});
    return Object.assign({},r,{diff:'same'});
  });
}

function getDel(cat){
  var selDate=toD(curDay),result=[],seen={};
  Object.keys(ALL).forEach(function(fd){
    var src=ALL[fd],cats=src&&src['降價']?src['降價']:src;
    if(!(cats[cat]))return;
    cats[cat].forEach(function(sec){
      if(!sec.endDate)return;
      var ed=toD(sec.endDate);if(!ed)return;
      var diffSel=dd(ed,selDate);
      if(diffSel!==0&&diffSel!==-1)return;
      var uid=cat+'|'+(sec.label||'')+'|'+(sec.period||'');
      if(seen[uid])return;seen[uid]=1;
      // diffSel===0  → 今天是最後一天（當日結束）
      // diffSel===-1 → 昨天結束，今天需要回原價
      var label=diffSel===0?'當日結束':'回原價';
      sec.rows.forEach(function(r){
        result.push(Object.assign({},r,{diff:'del',expLabel:label,
          secLabel:sec.label||'',secPeriod:sec.period||'',secEnd:sec.endDate||''
        }));
      });
    });
  });
  return result;
}

function renderSt(){
  var acts=getActs(curDay);
  var total=0,b2=0,b1=0,nc=0,nd=0,adjDown=0,adjUp=0;
  var cats={};
  acts.forEach(function(a){
    if(a.isAdj){
      a.sec.rows.forEach(function(r){r.pct<0?adjDown++:adjUp++;});
      return;
    }
    cats[a.cat]=1;
    getDiff(a.sec.rows,getCmpR(a.cat)).forEach(function(r){
      total++;
      if(r.buy2)b2++;
      if(r.buy1get1)b1++;
      // 新增統計已移除
      if(r.diff==='chg')nc++;
    });
  });
  // 直接加總所有到期品項數（不去重，反映實際筆數）
  ['食品','用品','生鮮'].forEach(function(cat){
    nd+=getDel(cat).length;
  });
  var sel=DAYS.filter(function(x){return x.key===curDay;})[0];
  var lbl=sel?(sel.diff===0?'今天':sel.diff===-1?'昨天':sel.diff===1?'明天':sel.diff<0?Math.abs(sel.diff)+'天前':sel.diff+'天後'):'';
  var stClick='cursor:pointer;transition:.15s;';
  function mkSt(cls,style,f,content){
    return '<div class="st '+cls+'" style="cursor:pointer;transition:.15s;'+style+'" data-f="'+f+'">'+content+'</div>';
  }
  document.getElementById('strow').innerHTML=
    mkSt('s1','','all','<span class="st-n">'+acts.length+'</span><span class="st-l">'+lbl+'開始活動</span>')+
    (adjDown?mkSt('','border-color:#e24b4a','adjdown','<span class="st-n" style="color:#e24b4a">'+adjDown+'</span><span class="st-l">調價↓降</span>'):'')+
    (adjUp?mkSt('','border-color:#f97316','adjup','<span class="st-n" style="color:#f97316">'+adjUp+'</span><span class="st-l">調價↑漲</span>'):'')+
    (b2?mkSt('s3','','b2','<span class="st-n">'+b2+'</span><span class="st-l">買2特價</span>'):'')+
    (b1?mkSt('s4','','b1','<span class="st-n">'+b1+'</span><span class="st-l">買1送1</span>'):'')+
    (nd?mkSt('s6','','dl','<span class="st-n">'+nd+'</span><span class="st-l">到期/回原價</span>'):'')+
    (nc?mkSt('s7','','ch','<span class="st-n">'+nc+'</span><span class="st-l">異動品項</span>'):'');
  // 綁定點擊事件
  document.getElementById('strow').onclick=function(e){
    var el=e.target.closest('[data-f]');
    if(el)clickStat(el.getAttribute('data-f'));
  };
}

// ── 降幅視覺強調 ──────────────────────────────────────────────────────────
function discBadge(orig,promo){
  if(!orig||!promo||orig===promo)return'<span class="badge bs">持價</span>';
  var pct=Math.round((promo-orig)/orig*100);
  if(promo<orig){
    var absPct=Math.abs(pct);
    var cls='disc-lo',ic='▼';
    if(absPct>=30){cls='disc-hi';ic='🔥▼';}
    else if(absPct>=20){cls='disc-md2';ic='▼▼';}
    else if(absPct>=10){cls='disc-md1';ic='▼';}
    return'<span class="badge '+cls+'">'+ic+absPct+'%</span>';
  }
  return'<span class="badge bu">▲'+Math.abs(pct)+'%</span>';
}

// ── 調價視覺強調 ──────────────────────────────────────────────────────────
function adjBadge(pct){
  var absPct=Math.abs(pct).toFixed(1);
  if(pct<0){
    var cls='disc-lo';
    if(Math.abs(pct)>=30)cls='disc-hi';
    else if(Math.abs(pct)>=20)cls='disc-md2';
    else if(Math.abs(pct)>=10)cls='disc-md1';
    return'<span class="badge '+cls+'">▼'+absPct+'%</span>';
  }
  return'<span class="badge bu">▲'+absPct+'%</span>';
}

function pb(r){return discBadge(r.orig,r.promo);}
function db2(r){
  if(r.diff==='new')return'<span class="badge bn">新增</span>';
  if(r.diff==='del')return'<span class="badge bdl">刪除</span>';
  if(r.diff==='chg')return'<span class="badge bch">異動</span>';
  return'';
}

function discRowCls(orig,promo){
  if(!orig||!promo||orig===promo)return'';
  var pct=Math.abs(Math.round((promo-orig)/orig*100));
  if(promo<orig){
    if(pct>=30)return'rd3';
    if(pct>=20)return'rd2';
    if(pct>=10)return'rd1';
    return'rds';
  }
  return'';
}

function buildTbl(rows,sd){
  if(!rows.length)return'<div class="empty">無資料</div>';
  var h='<table><thead><tr><th style="width:32px">#</th><th style="width:62px">廠編</th><th style="width:80px">貨號</th><th>品名</th><th style="width:50px;text-align:right">原價</th><th style="width:54px;text-align:right">促銷</th><th style="width:130px">狀態</th></tr></thead><tbody>';
  rows.forEach(function(r){
    var cls=r.diff==='new'?'rn':r.diff==='del'?'rd':r.diff==='chg'?'rc':discRowCls(r.orig,r.promo);
    var b22=r.buy2?'<span class="badge b2">💙買2特$'+r.buy2+'</span>':'';
    var b11=r.buy1get1?'<span class="badge b1">🎁買1送1</span>':'';
    var bc=r.cancelBuy2?'<span class="badge bx">取消買2特</span>':'';
    var dn2=r.diff==='chg'?'<div class="dn2">原'+r.prevOrig+'→'+r.prevPromo+'</div>':'';
    h+='<tr class="'+cls+'">'+
      '<td style="color:#ccc;font-size:12px">'+r.num+'</td>'+
      '<td style="color:#999;font-size:12px">'+r.vendor+'</td>'+
      '<td style="color:#bbb;font-size:11px">'+r.sku+'</td>'+
      '<td>'+r.name+dn2+'</td>'+
      '<td style="text-align:right;color:#999">'+(r.orig||'')+'</td>'+
      '<td style="text-align:right;font-weight:600">'+(r.promo||'')+'</td>'+
      '<td><div class="bgs">'+pb(r)+(sd?db2(r):'')+b22+b11+bc+'</div></td>'+
      '</tr>';
  });
  return h+'</tbody></table>';
}

    '<th style="width:32px">#</th>'+
    '<th style="width:62px">廠商</th>'+
    '<th style="width:80px">貨號</th>'+

    '<th style="width:54px;text-align:right">調前</th>'+

      if(Math.abs(pct)>=30){rowCls='rd3';bgColor='#ffbaba';}

      else{rowCls='rds';bgColor='#fff5f5';}

      rowCls='adj-up';bgColor='#fff8f0';
    }
    var hist=buildSkuHistory(r.sku,r.name);
    h+='<div style="background:'+(bgColor||'#fff')+';border-bottom:1px solid #f0efeb">'+
      '<table style="width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px"><tbody>'+
      '<tr>'+
        '<td style="width:32px;padding:7px 11px;color:#ccc;font-size:12px">'+r.num+'</td>'+
        '<td style="width:62px;padding:7px 11px;color:#999;font-size:12px">'+r.vendor+'</td>'+
        '<td style="width:80px;padding:7px 11px;color:#bbb;font-size:11px">'+r.sku+'</td>'+
        '<td style="padding:7px 11px">'+r.name+'</td>'+
        '<td style="width:54px;padding:7px 11px;text-align:right;color:#999">'+r.before+'</td>'+

      '</tr>'+

  });
  return h+'</div>';

function buildReturnTbl(rows){
  if(!rows.length)return'<div class="empty">無資料</div>';
  var h='<table><thead><tr>'+
    '<th style="width:32px">#</th>'+
    '<th style="width:62px">廠編</th>'+

    var returnPct=r.orig&&r.promo&&r.orig!==r.promo
      ?Math.round((r.orig-r.promo)/r.promo*100):0;
    var returnBadge=returnPct>0
      ?'<span class="badge bu">▲+'+returnPct+'%</span>'
      :'<span class="badge bs">持平</span>';
    h+='<tr style="background:#fff8f0">'+
      '<td style="color:#ccc;font-size:12px">'+r.num+'</td>'+
      '<td style="color:#999;font-size:12px">'+r.vendor+'</td>'+

      '<td><div class="bgs">'+returnBadge+'</div></td>'+
      '</tr>';
  });
  return h+'</tbody></table>';
}

function ctCls(cat){return cat==='食品'?'ct-f':cat==='用品'?'ct-g':cat==='生鮮'?'ct-s':cat==='調價'?'ct-adj':'ct-o';}

function toggleCard(hd){

  if(arr)arr.textContent=arr.textContent.replace(op?'▾':'▴',op?'▴':'▾');
}

      var b1c=rows.filter(function(r){return r.buy1get1;}).length;

      var chc=rows.filter(function(r){return r.diff==='chg';}).length;

      var eb=a.sec.endDate?'<span class="badge bs" style="font-size:10px">至 '+a.sec.endDate+'</span>':'';

      var chb=chc?'<span class="badge bch">異動 '+chc+'</span>':'';
      var maxb=maxDisc>=10?'<span class="badge '+(maxDisc>=30?'disc-hi':maxDisc>=20?'disc-md2':'disc-md1')+'">最高▼'+maxDisc+'%</span>':'';
      h+='<div class="card">'+
        '<div class="card-hd" onclick="toggleCard(this)">'+

        eb+maxb+b2b+b1b+nwb+chb+

    });

}

function buildSkuHistory(sku,name){
  var records=(SKU_HISTORY[sku]||SKU_HISTORY[name]||[]);
  if(!records.length)return'';
  // 依日期排序
  records=records.slice().sort(function(a,b){return a.date>b.date?1:-1;});
  var minPromo=Infinity,maxDisc=0;
  records.forEach(function(r){if(r.promo&&r.promo<minPromo)minPromo=r.promo;if(r.discPct&&Math.abs(r.discPct)>maxDisc)maxDisc=Math.abs(r.discPct);});
  var rows=records.map(function(r){
    var pct=r.discPct?r.discPct:0;
    var absPct=Math.abs(pct).toFixed(1);
    var pcls=pct<=-30?'disc-hi':pct<=-20?'disc-md2':pct<=-10?'disc-md1':pct<0?'disc-lo':'';
    var pBadge=pct<0?'<span class="badge '+pcls+'">▼'+absPct+'%</span>':pct>0?'<span class="badge bu">▲'+absPct+'%</span>':'<span class="badge bs">持價</span>';
    var b2=r.buy2?'<span class="badge b2" style="font-size:10px">💙$'+r.buy2+'</span>':'';
    var b1=r.buy1get1?'<span class="badge b1" style="font-size:10px">🎁</span>':'';
    return'<tr style="border-bottom:0.5px solid #f0efeb">'+
      '<td style="padding:5px 8px;font-size:11px;color:#999;white-space:nowrap">'+r.date+'</td>'+
      '<td style="padding:5px 8px;font-size:11px;color:#888;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.label+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;text-align:right;color:#999">'+r.orig+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;text-align:right;font-weight:600">'+r.promo+'</td>'+
      '<td style="padding:5px 8px"><div style="display:flex;gap:3px;align-items:center">'+pBadge+b2+b1+'</div></td>'+
      '</tr>';
  }).join('');
  var summary='共'+records.length+'次促銷紀錄';
  if(minPromo<Infinity)summary+='・最低促銷價 <strong>'+minPromo+'</strong>';
  if(maxDisc>=10)summary+='・最大降幅 <strong>▼'+maxDisc.toFixed(1)+'%</strong>';
  return'<div style="background:#f9f8f6;border-top:1px solid #e2e0d8;padding:10px 14px">'+
    '<div style="font-size:11px;font-weight:600;color:#555;margin-bottom:7px">📋 歷史促銷紀錄・'+summary+'</div>'+
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:360px">'+
    '<thead><tr style="border-bottom:1px solid #e2e0d8">'+
    '<th style="padding:4px 8px;font-size:10px;color:#aaa;text-align:left;font-weight:500">日期</th>'+
    '<th style="padding:4px 8px;font-size:10px;color:#aaa;text-align:left;font-weight:500">促銷點</th>'+
    '<th style="padding:4px 8px;font-size:10px;color:#aaa;text-align:right;font-weight:500">原價</th>'+
    '<th style="padding:4px 8px;font-size:10px;color:#aaa;text-align:right;font-weight:500">促銷</th>'+
    '<th style="padding:4px 8px;font-size:10px;color:#aaa;text-align:left;font-weight:500">幅度</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function renderTopDiscountAlerts(){
  var items=[];var seen={};
  Object.keys(ALL).forEach(function(fd){
    var cats=ALL[fd]['降價']||ALL[fd];
    Object.keys(cats).forEach(function(cat){
      if(cat==='調價')return;
      cats[cat].forEach(function(sec,idx){
        var sd=toD(sec.startDate),ed=toD(sec.endDate);
        if(!sd)return;
        if(ed&&ed<TODAY)return;
        var sdiff=dd(sd,TODAY);
        if(sdiff!==0&&sdiff!==1)return;
        var key=cat+'|'+(sec.label||'')+'|'+(sec.period||'');
        if(seen[key])return;seen[key]=1;
        var maxPct=0;
        sec.rows.forEach(function(r){
          if(r.orig&&r.promo&&r.promo<r.orig){
            var p=Math.abs(Math.round((r.promo-r.orig)/r.orig*100));
            if(p>maxPct)maxPct=p;
          }
        });
        if(maxPct<10)return;
        items.push({cat:cat,sec:sec,idx:idx,fd:fd,maxPct:maxPct,sdiff:sdiff});
      });
    });
  });
  items.sort(function(a,b){return b.maxPct-a.maxPct;});
  items=items.slice(0,4);
  if(!items.length)return '';
  var cards=items.map(function(it){
    var cls=it.maxPct>=30?'ac-disc3':it.maxPct>=20?'ac-disc2':'ac-disc1';
    var fire=it.maxPct>=30?'🔥🔥':it.maxPct>=20?'🔥':'📉';
    var when=it.sdiff===0?'今日開始':'明日開始';
    var oc='showM(\''+it.cat+'\','+it.idx+',null,\''+it.fd+'\')';
    return '<div class="ac '+cls+'" onclick="'+oc+'">'+
      '<div class="ac-tag">'+fire+' 最高降幅 '+it.maxPct+'%</div>'+
      '<div class="ac-title">'+(it.sec.label||'—')+'</div>'+
      '<div class="ac-sub">'+it.cat+'・'+when+'・'+it.sec.rows.length+'項</div>'+
      '<div class="ac-hint">點擊查看 →</div></div>';
  }).join('');
  return '<div class="al-lbl"><span class="dot dot-r"></span>降價幅度最大活動</div><div class="al-grid">'+cards+'</div>';
}

function renderAlerts(){
  var s2t=[],s2tm=[],s1t=[],s1tm=[];
  var e2t=[],e2tm=[],e1t=[],e1tm=[];
  var seen={};
  Object.keys(ALL).forEach(function(fd){
    var cats=ALL[fd]['降價']||ALL[fd];
    Object.keys(cats).forEach(function(cat){
      if(cat==='調價')return;
      cats[cat].forEach(function(sec,idx){
        var sd=toD(sec.startDate),ed=toD(sec.endDate);
        if(ed&&ed<TODAY)return;
        var sdiff=sd?dd(sd,TODAY):null;
        var ediff=ed?dd(ed,TODAY):null;
        var hasBuy2=sec.rows.some(function(r){return r.buy2;});
        var hasB1g1=sec.rows.some(function(r){return r.buy1get1;});
        var key=cat+'|'+(sec.label||'')+'|'+(sec.period||'');
        if(hasBuy2){
          if(sdiff===0&&!seen['s2t|'+key]){seen['s2t|'+key]=1;s2t.push({cat:cat,sec:sec,idx:idx,fd:fd});}
          else if(sdiff===1&&!seen['s2tm|'+key]){seen['s2tm|'+key]=1;s2tm.push({cat:cat,sec:sec,idx:idx,fd:fd});}
        }
        if(hasB1g1){
          if(sdiff===0&&!seen['s1t|'+key]){seen['s1t|'+key]=1;s1t.push({cat:cat,sec:sec,idx:idx,fd:fd});}
          else if(sdiff===1&&!seen['s1tm|'+key]){seen['s1tm|'+key]=1;s1tm.push({cat:cat,sec:sec,idx:idx,fd:fd});}
        }
        if(hasBuy2&&ediff!==null){
          if(ediff===0&&!seen['e2t|'+key]){seen['e2t|'+key]=1;e2t.push({cat:cat,sec:sec,idx:idx,fd:fd});}
          else if(ediff===1&&!seen['e2tm|'+key]){seen['e2tm|'+key]=1;e2tm.push({cat:cat,sec:sec,idx:idx,fd:fd});}
        }
        if(hasB1g1&&ediff!==null){
          if(ediff===0&&!seen['e1t|'+key]){seen['e1t|'+key]=1;e1t.push({cat:cat,sec:sec,idx:idx,fd:fd});}
          else if(ediff===1&&!seen['e1tm|'+key]){seen['e1tm|'+key]=1;e1tm.push({cat:cat,sec:sec,idx:idx,fd:fd});}
        }
      });
    });
  });

  function mkCard(it,tp){
    var b2c=it.sec.rows.filter(function(r){return r.buy2;}).length;
    var b1c=it.sec.rows.filter(function(r){return r.buy1get1;}).length;
    var cl,tag,sub,fm;
    if(tp==='s2t') {cl='ac-r';tag='🔴 今日開始・買2特';sub=it.cat+'・'+it.sec.period+'・'+b2c+'項買2特';fm='b2';}
    else if(tp==='s2tm'){cl='ac-a';tag='🟡 明日開始・買2特';sub=it.cat+'・'+it.sec.period+'・'+b2c+'項買2特';fm='b2';}
    else if(tp==='s1t') {cl='ac-r';tag='🔴 今日開始・買1送1';sub=it.cat+'・'+it.sec.period+'・'+b1c+'項買1送1';fm='b1';}
    else if(tp==='s1tm'){cl='ac-a';tag='🟡 明日開始・買1送1';sub=it.cat+'・'+it.sec.period+'・'+b1c+'項買1送1';fm='b1';}
    else if(tp==='e2t') {cl='ac-p';tag='🔔 今日到期・買2特';sub=it.cat+'・結束：'+it.sec.endDate+'・'+b2c+'項';fm='b2';}
    else if(tp==='e2tm'){cl='ac-o';tag='⏳ 明日到期・買2特';sub=it.cat+'・結束：'+it.sec.endDate+'・'+b2c+'項';fm='b2';}
    else if(tp==='e1t') {cl='ac-p';tag='🔔 今日到期・買1送1';sub=it.cat+'・結束：'+it.sec.endDate+'・'+b1c+'項';fm='b1';}
    else               {cl='ac-o';tag='⏳ 明日到期・買1送1';sub=it.cat+'・結束：'+it.sec.endDate+'・'+b1c+'項';fm='b1';}
    var oc='showM(\''+it.cat+'\','+it.idx+',\''+fm+'\',\''+it.fd+'\')';
    return '<div class="ac '+cl+'" onclick="'+oc+'">'+
      '<div class="ac-tag">'+tag+'</div>'+
      '<div class="ac-title">'+(it.sec.label||'—')+'</div>'+
      '<div class="ac-sub">'+sub+'</div>'+
      '<div class="ac-hint">點擊查看 →</div></div>';
  }

  var h='';
  // 只保留降幅最大活動，移除買2特/買1送1提醒卡片
    document.getElementById('alrt').innerHTML=h?'<div class="al-sec">'+h+'</div>':'';
}

function showM(cat,idx,fm,fd){
  var src=fd||Object.keys(ALL).sort().pop();
  var srcData=ALL[src];
  var cats=srcData&&srcData['降價']?srcData['降價']:srcData;
  var sec=(cats[cat]||[])[idx];
  if(!sec)return;
  var rows=fm==='b2'?sec.rows.filter(function(r){return r.buy2;}):
           fm==='b1'?sec.rows.filter(function(r){return r.buy1get1;}):
           sec.rows;
  var b2c=sec.rows.filter(function(r){return r.buy2;}).length;
  var b1c=sec.rows.filter(function(r){return r.buy1get1;}).length;
  document.getElementById('mt').textContent=cat+'｜'+(sec.label||'—');
  document.getElementById('ms').textContent='促銷期間：'+sec.period+'　共'+sec.rows.length+'項'+
    (b2c?'　買2特：'+b2c+'項':'')+(b1c?'　買1送1：'+b1c+'項':'')+
    (fm==='b2'?'　（僅顯示買2特品項）':fm==='b1'?'　（僅顯示買1送1品項）':'');
  document.getElementById('mb').innerHTML=buildTbl(rows,false);
  document.getElementById('mbg').classList.add('open');
}
function closeM(){document.getElementById('mbg').classList.remove('open');}
function setF(f,btn){curF=f;document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');render();}

buildDN();buildCmp();renderAlerts();renderSt();render();








</script>
