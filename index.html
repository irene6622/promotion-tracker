<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>促銷異動追蹤系統</title>
    <script src="data.js"></script>
    <style>
        :root { --primary: #e24b4a; --bg: #f5f5f3; --del: #999; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .nav-wrapper { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .date-btn { flex: 0 0 75px; padding: 10px 5px; background: white; border: 1px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; }
        .date-btn.active { background: #333; color: white; }
        .date-btn.today { border: 2px solid var(--primary); color: var(--primary); font-weight: bold; }
        .filter-group { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
        .f-btn { padding: 8px 12px; background: #fff; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .f-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .f-btn.active.del-mode { background: #555; border-color: #555; }
        
        .card { background: white; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .card-hd { padding: 10px; background: #f8f9fa; font-weight: bold; font-size: 13px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
        
        /* 狀態樣式 */
        tr.is-delete { background-color: #f0f0f0; color: var(--del); }
        tr.is-delete .price { color: var(--del); text-decoration: line-through; }
        
        .p-name { font-size: 15px; font-weight: bold; display: block; margin-bottom: 3px; }
        .price { color: var(--primary); font-weight: bold; font-size: 17px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-top: 5px; font-weight: bold; background: #eee; }
        .b-del { background: #555; color: white; }
        .b-b1g1 { background: #fff0f0; color: red; border: 1px solid red; }
    </style>
</head>
<body>
    <div id="date-nav" class="nav-wrapper"></div>
    
    <div class="filter-group">
        <button class="f-btn active" onclick="setCat('全部', this)">全部</button>
        <button class="f-btn" onclick="setCat('食品', this)">食品</button>
        <button class="f-btn" onclick="setCat('用品', this)">用品</button>
        <button class="f-btn" onclick="setCat('生鮮', this)">生鮮</button>
    </div>

    <div class="filter-group">
        <button class="f-btn" id="f-b1g1" onclick="toggleF('b1g1')">🎁 買1送1</button>
        <button class="f-btn" id="f-buy2" onclick="toggleF('buy2')">💙 2特</button>
        <button class="f-btn" id="f-isDelete" onclick="toggleF('isDelete', true)">❌ 刪除/取消</button>
    </div>

    <div id="main-content"></div>

    <script>
        function getD(o) {
            const d = new Date(); d.setDate(d.getDate() + o);
            const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), r = String(d.getDate()).padStart(2,'0');
            return { full: y+"-"+m+"-"+r, short: (d.getMonth()+1)+"/"+d.getDate(), label: o===0?"今天":o+"D" };
        }
        let curD = getD(0).full, curC = '全部', filters = { b1g1: false, buy2: false, isDelete: false };

        function render() {
            const cont = document.getElementById('main-content'); cont.innerHTML = "";
            if (typeof ALL_DATA === 'undefined') return;
            let found = false;

            for (const f in ALL_DATA) {
                for (const s in ALL_DATA[f]) {
                    if (curC !== '全部' && !s.includes(curC)) continue;

                    ALL_DATA[f][s].forEach(sec => {
                        if (sec.startDate !== curD) return;

                        const rows = sec.rows.filter(r => {
                            if (filters.b1g1 && !r.buy1get1) return false;
                            if (filters.buy2 && !r.buy2) return false;
                            if (filters.isDelete && !r.isDelete) return false;
                            return true;
                        });

                        if (rows.length > 0) {
                            found = true;
                            let h = `<div class="card"><div class="card-hd"><span>${s}</span><small>${sec.startDate}</small></div><table>`;
                            rows.forEach(r => {
                                const delCls = r.isDelete ? 'is-delete' : '';
                                h += `<tr class="${delCls}"><td><span class="p-name">${r.name}</span><small>${r.sku}</small></td>
                                    <td style="width:70px;text-align:right"><span class="price">$${r.promo}</span><br><small>$${r.orig}</small></td>
                                    <td style="width:100px;text-align:right">
                                        ${r.isDelete ? '<span class="badge b-del">❌ 已取消</span>' : ''}
                                        ${r.buy1get1 ? '<span class="badge b-b1g1">🎁 買1送1</span>' : ''}
                                        ${r.buy2 ? '<span class="badge" style="color:blue; border:1px solid blue;">💙 2特$'+r.buy2+'</span>' : ''}
                                        <div style="font-size:10px; margin-top:4px;">${r.note}</div>
                                    </td></tr>`;
                            });
                            cont.innerHTML += h + "</table></div>";
                        }
                    });
                }
            }
            if(!found) cont.innerHTML = `<p style="text-align:center;color:#999;padding-top:50px">${curD} 無資料</p>`;
        }

        function buildNav() {
            const n = document.getElementById('date-nav'); n.innerHTML = "";
            for (let i=-3; i<=7; i++) {
                const info = getD(i);
                const b = document.createElement('div');
                b.className = `date-btn ${i===0?'today':''} ${info.full===curD?'active':''}`;
                b.innerHTML = `${info.short}<br><small>${info.label}</small>`;
                b.onclick = () => { curD = info.full; buildNav(); render(); };
                n.appendChild(b);
            }
        }
        function setCat(c, b) { curC = c; document.querySelectorAll('.filter-group:first-child .f-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); }
        function toggleF(t, isDelBtn) { 
            filters[t] = !filters[t]; 
            const btn = document.getElementById('f-'+t);
            btn.classList.toggle('active');
            if(isDelBtn) btn.classList.toggle('del-mode');
            render(); 
        }
        window.onload = () => { buildNav(); render(); };
    </script>
</body>
</html>
