<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>促銷追蹤系統</title>
    <script src="data.js"></script>
    <style>
        :root { --primary: #e24b4a; --bg: #f5f5f3; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .nav-wrapper { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; }
        .date-btn { flex: 0 0 80px; padding: 10px 5px; background: white; border: 1px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; font-size: 14px; }
        .date-btn.active { background: #333; color: white; border-color: #333; }
        .date-btn.today { border: 2px solid var(--primary); color: var(--primary); font-weight: bold; }
        
        .filter-group { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .f-btn { padding: 6px 12px; background: #fff; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .f-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .card { background: white; border-radius: 10px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .card-hd { padding: 10px; background: #f8f9fa; font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: top; }
        .price { color: var(--primary); font-weight: bold; font-size: 16px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; background: #f0f0f0; margin-top: 5px; }
    </style>
</head>
<body>

    <h3 id="view-title">促銷資料載入中...</h3>
    <div class="nav-wrapper" id="date-nav"></div>

    <div class="filter-group" id="cat-filters">
        <button class="f-btn active" onclick="setCat('全部', this)">全部類別</button>
        <button class="f-btn" onclick="setCat('食品', this)">食品</button>
        <button class="f-btn" onclick="setCat('用品', this)">用品</button>
        <button class="f-btn" onclick="setCat('生鮮', this)">生鮮</button>
    </div>

    <div class="filter-group">
        <button class="f-btn" id="f-b1g1" onclick="toggleF('b1g1')">🎁 買1送1</button>
        <button class="f-btn" id="f-buy2" onclick="toggleF('buy2')">💙 2特</button>
        <button class="f-btn" id="f-end" onclick="toggleF('end')">⌛ 今日到期</button>
    </div>

    <div id="main-content"></div>

    <script>
        // 日期計算
        function getD(offset) {
            const d = new Date();
            d.setDate(d.getDate() + offset);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return { full: y + "-" + m + "-" + day, short: (d.getMonth()+1) + "/" + d.getDate(), label: offset === 0 ? "今天" : offset + "D" };
        }

        let curDate = getD(0).full;
        let curCat = '全部';
        let filters = { b1g1: false, buy2: false, end: false };

        function init() {
            if (typeof ALL_DATA === 'undefined') {
                document.getElementById('main-content').innerHTML = "<div style='color:red; text-align:center; padding:20px;'>❌ 錯誤：找不到資料檔案 data.js。<br>請確認已執行 Python 並產出檔案。</div>";
                return;
            }
            document.getElementById('view-title').innerText = "📅 異動促銷追蹤";
            buildNav();
            render();
        }

        function buildNav() {
            const nav = document.getElementById('date-nav');
            nav.innerHTML = "";
            for (let i = -3; i <= 3; i++) {
                const info = getD(i);
                const btn = document.createElement('div');
                btn.className = "date-btn" + (i === 0 ? " today" : "") + (info.full === curDate ? " active" : "");
                btn.innerHTML = info.short + "<br><small>" + info.label + "</small>";
                btn.onclick = function() { curDate = info.full; buildNav(); render(); };
                nav.appendChild(btn);
            }
        }

        function setCat(cat, btn) {
            curCat = cat;
            document.querySelectorAll('#cat-filters .f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function toggleF(t) {
            filters[t] = !filters[t];
            document.getElementById('f-' + t).classList.toggle('active');
            render();
        }

        function render() {
            const content = document.getElementById('main-content');
            content.innerHTML = "";
            let found = false;

            for (const file in ALL_DATA) {
                for (const sheet in ALL_DATA[file]) {
                    if (curCat !== '全部' && !sheet.includes(curCat)) continue;

                    ALL_DATA[file][sheet].forEach(sec => {
                        const targetDate = filters.end ? sec.endDate : sec.startDate;
                        if (targetDate !== curDate) return;

                        const rows = sec.rows.filter(r => {
                            if (filters.b1g1 && !r.buy1get1) return false;
                            if (filters.buy2 && !r.buy2) return false;
                            return true;
                        });

                        if (rows.length > 0) {
                            found = true;
                            const card = document.createElement('div');
                            card.className = "card";
                            card.innerHTML = "<div class='card-hd'><span>" + sheet + " | " + sec.label + "</span><small>" + sec.startDate + " ~ " + sec.endDate + "</small></div>";
                            let table = "<table>";
                            rows.forEach(r => {
                                table += "<tr><td><b>" + r.name + "</b><br><small style='color:#999'>" + r.sku + "</small></td>";
                                table += "<td style='width:70px'><span class='price'>$" + r.promo + "</span><br><small style='text-decoration:line-through; color:#ccc'>$" + r.orig + "</small></td>";
                                table += "<td>" + (r.buy1get1 ? "<span class='badge' style='color:red'>🎁 買1送1</span> " : "") + (r.buy2 ? "<span class='badge' style='color:blue'>💙 2特$" + r.buy2 + "</span>" : "") + "<div style='font-size:11px; color:#888; margin-top:5px;'>" + r.note + "</div></td></tr>";
                            });
                            card.innerHTML += table + "</table>";
                            content.appendChild(card);
                        }
                    });
                }
            }
            if (!found) content.innerHTML = "<p style='text-align:center; padding:40px; color:#999;'>" + curDate + " 無活動資料</p>";
        }

        window.onload = init;
    </script>
</body>
</html>
