<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>異動促銷追蹤系統</title>
<script src="data.js"></script>
<style>
    :root { --primary: #e24b4a; --bg: #f5f5f3; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
    .nav-wrapper { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px; }
    .date-btn { 
        flex: 1; min-width: 80px; padding: 10px; background: white; border: 1px solid #ddd; 
        border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s;
    }
    .date-btn.active { background: #333; color: white; border-color: #333; }
    .date-btn.today { border: 2px solid var(--primary); color: var(--primary); font-weight: bold; }
    
    .stats-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .stat-item { background: white; padding: 10px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .stat-num { font-size: 20px; font-weight: bold; display: block; }
    .stat-label { font-size: 11px; color: #888; }

    .card { background: white; border-radius: 10px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card-hd { padding: 12px; background: #eee; font-weight: bold; display: flex; justify-content: space-between; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #fafafa; padding: 8px; text-align: left; color: #666; border-bottom: 1px solid #eee; }
    td { padding: 8px; border-bottom: 1px solid #eee; }
    
    .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; color: white; margin-right: 3px; }
    .b-new { background: #34c759; } .b-chg { background: #ff9500; } .b-del { background: #ff3b30; }
    .b-b1g1 { background: #af52de; } .b-b2 { background: #007aff; }

    .cmp-section { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }
</style>
</head>
<body>

    <h2 id="view-title">載入中...</h2>
    <div class="nav-wrapper" id="date-nav"></div>

    <div id="stats" class="stats-row"></div>
    <div id="main-content"></div>

    <div class="cmp-section">
        <h3>比對基準設定</h3>
        <p style="font-size: 12px; color: #666;">目前的「新增/異動/刪除」是基於最新檔案與前一份檔案的比對結果。</p>
        <div id="file-list"></div>
    </div>

<script>
    const TODAY = new Date(); TODAY.setHours(0,0,0,0);
    let curDateKey = formatDate(TODAY);
    const fileKeys = Object.keys(ALL).sort();
    let cmpFile = fileKeys.length >= 2 ? fileKeys[fileKeys.length - 2] : fileKeys[fileKeys.length - 1];

    function formatDate(d) {
        return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
    }

    function buildNav() {
        const nav = document.getElementById('date-nav');
        for (let i = -3; i <= 3; i++) {
            const d = new Date(TODAY); d.setDate(TODAY.getDate() + i);
            const key = formatDate(d);
            const btn = document.createElement('div');
            btn.className = `date-btn ${i === 0 ? 'today' : ''} ${key === curDateKey ? 'active' : ''}`;
            btn.innerHTML = `<span style="font-size:12px">${d.getMonth()+1}/${d.getDate()}</span><br><span style="font-size:10px">${i===0?'今天':i+'天'}</span>`;
            btn.onclick = () => { curDateKey = key; buildNav(); render(); };
            nav.appendChild(btn);
        }
        document.getElementById('view-title').innerText = `📅 活動日期：${curDateKey}`;
    }

    function render() {
        const content = document.getElementById('main-content');
        content.innerHTML = "";
        
        let foundAny = false;
        let totalItems = 0, newItems = 0, b1g1Items = 0, b2Items = 0;

        // 遍歷所有檔案，尋找在選定日期「開始」的活動
        fileKeys.forEach(fKey => {
            const dayData = ALL[fKey];
            Object.entries(dayData).forEach(([cat, sections]) => {
                sections.forEach(sec => {
                    if (sec.startDate === curDateKey) {
                        foundAny = true;
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `<div class="card-hd"><span>[${cat}] ${sec.label}</span><span style="font-size:11px">${sec.period}</span></div>`;
                        
                        let rowsHtml = sec.rows.map(r => {
                            totalItems++;
                            if (r.buy1get1) b1g1Items++;
                            if (r.buy2) b2Items++;
                            
                            return `<tr>
                                <td>${r.name}</td>
                                <td>${r.orig}</td>
                                <td style="color:red; font-weight:bold;">${r.promo}</td>
                                <td>
                                    ${r.buy1get1 ? '<span class="badge b-b1g1">買1送1</span>':''}
                                    ${r.buy2 ? `<span class="badge b-b2">買2特$${r.buy2}</span>`:''}
                                    <span style="font-size:10px; color:#888">${r.note}</span>
                                </td>
                            </tr>`;
                        }).join('');
                        
                        card.innerHTML += `<table><thead><tr><th>品名</th><th>原價</th><th>促銷</th><th>標記</th></tr></thead><tbody>${rowsHtml}</tbody></table>`;
                        content.appendChild(card);
                    }
                });
            });
        });

        if (!foundAny) content.innerHTML = "<div style='text-align:center; padding:50px; color:#aaa;'>此日期無新開始的活動</div>";

        document.getElementById('stats').innerHTML = `
            <div class="stat-item"><span class="stat-num">${totalItems}</span><span class="stat-label">總項</span></div>
            <div class="stat-item"><span class="stat-num">${b1g1Items}</span><span class="stat-label">買1送1</span></div>
            <div class="stat-item"><span class="stat-num">${b2Items}</span><span class="stat-label">買2特價</span></div>
        `;
    }

    window.onload = () => { buildNav(); render(); };
</script>
</body>
</html>
