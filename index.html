<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>異動促銷追蹤</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;background:#f5f5f3;color:#1a1a18;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:20px 16px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.hd h1{font-size:18px;font-weight:700}
.today{font-size:12px;color:#888}
.alert-section{margin-bottom:18px}
.alert-label{font-size:12px;font-weight:600;color:#555;display:flex;align-items:center;gap:6px;margin-bottom:7px;margin-top:12px}
.alert-label:first-child{margin-top:0}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-red   {background:#e24b4a;animation:blink 1.4s infinite}
.dot-amber {background:#ef9f27;animation:blink 1.4s .3s infinite}
.dot-orange{background:#f97316;animation:blink 1s infinite}
.dot-purple{background:#9333ea;animation:blink 1.2s .2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.alert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:4px}
.ac{border-radius:10px;padding:12px 14px;border-left:4px solid;cursor:pointer;transition:.15s;user-select:none}
.ac:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12)}
.ac-today{background:#fcebeb;border-color:#e24b4a}
.ac-tmr  {background:#faeeda;border-color:#ef9f27}
.ac-exp  {background:#fff4f0;border-color:#f97316}
.ac-end  {background:#f9f0ff;border-color:#9333ea}
.ac-tag{font-size:10px;font-weight:700;letter-spacing:.4px;margin-bottom:3px}
.ac-today .ac-tag{color:#a32d2d}
.ac-tmr   .ac-tag{color:#854f0b}
.ac-exp   .ac-tag{color:#c2410c}
.ac-end   .ac-tag{color:#7e22ce}
.ac-title{font-size:13px;font-weight:600;color:#1a1a18}
.ac-sub{font-size:11px;color:#777;margin-top:2px}
.ac-hint{font-size:11px;font-style:italic;margin-top:4px}
.ac-today .ac-hint{color:#a32d2d}
.ac-tmr   .ac-hint{color:#854f0b}
.ac-exp   .ac-hint{color:#c2410c}
.ac-end   .ac-hint{color:#7e22ce}
.date-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.dt{padding:6px 16px;border:1.5px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#666;transition:.15s}
.dt.on{background:#1a1a18;color:#fff;border-color:#1a1a18;font-weight:600}
.cmp-lbl{font-size:12px;color:#999;margin-left:auto}
.ctrl{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.cat-tabs{display:flex;gap:4px}
.ct{padding:5px 14px;border:1px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#666;transition:.15s}
.ct.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.search{padding:5px 12px;border:1px solid #ddd;border-radius:20px;font-size:13px;outline:none;min-width:140px}
.search:focus{border-color:#378add}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:4px 11px;border:1.5px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#666;transition:.15s}
.fb.on.fa {background:#1a1a18;color:#fff;border-color:#1a1a18}
.fb.on.fn {background:#eaf3de;color:#3b6d11;border-color:#639922}
.fb.on.fd {background:#fcebeb;color:#a32d2d;border-color:#e24b4a}
.fb.on.fc {background:#faeeda;color:#854f0b;border-color:#ef9f27}
.fb.on.fb2{background:#e6f1fb;color:#185fa5;border-color:#378add}
.diff-legend{display:flex;gap:10px;align-items:center;margin-bottom:12px;font-size:12px;color:#888;flex-wrap:wrap}
.diff-legend span{display:flex;align-items:center;gap:4px}
.sw{width:12px;height:12px;border-radius:3px;border:1px solid;display:inline-block}
.tbl-wrap{background:#fff;border:1px solid #e2e0d8;border-radius:10px;overflow:hidden;margin-bottom:12px}
.sec-hd{padding:9px 14px;background:#f9f9f7;border-bottom:1px solid #e2e0d8;display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.sec-hd strong{font-weight:600}
.sec-period{color:#888;font-size:12px}
.sec-cnt{margin-left:auto;color:#888;font-size:12px;white-space:nowrap}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
th{padding:7px 11px;text-align:left;font-size:11px;font-weight:600;color:#888;border-bottom:1px solid #e2e0d8;background:#f9f9f7;white-space:nowrap}
td{padding:7px 11px;border-bottom:1px solid #f0efeb;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
tr.rn td{background:#f2fae8}
tr.rd td{background:#fff4f4;opacity:.75}
tr.rc td{background:#fffbf0}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-down  {background:#fcebeb;color:#a32d2d}
.b-up    {background:#faeeda;color:#854f0b}
.b-same  {background:#f1efe8;color:#5f5e5a}
.b-buy2  {background:#e6f1fb;color:#185fa5;font-weight:700}
.b-new   {background:#eaf3de;color:#3b6d11}
.b-del   {background:#fcebeb;color:#a32d2d}
.b-chg   {background:#faeeda;color:#854f0b}
.b-cancel{background:#f1efe8;color:#5f5e5a}
.badges{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.diff-note{font-size:11px;color:#aaa}
.empty{padding:36px;text-align:center;color:#aaa}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:780px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhd{display:flex;align-items:flex-start;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #e2e0d8;gap:10px}
.mtitle{font-size:15px;font-weight:700}
.msub{font-size:12px;color:#888;margin-top:2px}
.mclose{cursor:pointer;font-size:24px;color:#aaa;line-height:1;flex-shrink:0}
.mclose:hover{color:#333}
.mbody{overflow-y:auto}
.fb.on.fp2{background:#fff0e6;color:#c2410c;border-color:#f97316}
.promo-sec-hd{padding:9px 14px;background:#fff8f0;border-bottom:1px solid #fde8d0;display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.promo-sec-hd strong{font-weight:600;color:#c2410c}
.b-b1g1{background:#fff0e6;color:#c2410c;font-weight:700}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>異動促銷追蹤</h1>
    <span class="today" id="today-lbl"></span>
  </div>
  <div id="alert-area"></div>
  <div class="date-row" id="date-tabs"></div>

  <!-- 特價專區 -->
  <div id="promo-zone" style="display:none">
    <div class="ctrl">
      <input class="search" id="promo-search" placeholder="搜尋品名、貨號…" oninput="renderPromo()">
      <div class="filters">

        <button class="fb fp2"    onclick="setPromoF('buy2',this)">💙 買2特價</button>
        <button class="fb fp2"    onclick="setPromoF('b1g1',this)">🎁 買1送1</button>
      </div>
      <button class="fb" style="margin-left:auto" onclick="exitPromo()">← 返回一般模式</button>
    </div>
    <div id="promo-area"></div>
  </div>

  <!-- 一般模式 -->
  <div id="normal-zone">
    <div class="ctrl">
      <div class="cat-tabs" id="cat-tabs"></div>
      <input class="search" id="search" placeholder="搜尋品名、貨號…" oninput="render()">
      <div class="filters">
        <button class="fb fa on" onclick="setF('all',this)">全部</button>
        <button class="fb fn"    onclick="setF('new',this)">新增</button>
        <button class="fb fd"    onclick="setF('del',this)">刪除</button>
        <button class="fb fc"    onclick="setF('chg',this)">變動</button>
        <button class="fb fb2"   onclick="setF('buy2',this)">💙 買2特價</button>
        <button class="fb fb2"   onclick="setF('b1g1',this)">🎁 買1送1</button>

      <button class="fb" style="background:#e6f1fb;color:#185fa5;border-color:#378add;font-weight:600" onclick="enterPromo()">🏷️ 特價專區</button>
    </div>
    <div class="diff-legend" id="diff-legend" style="display:none">
      比對差異：
      <span><span class="sw" style="background:#f2fae8;border-color:#cde9b0"></span>新增</span>
      <span><span class="sw" style="background:#fff4f4;border-color:#f5c5c5"></span>刪除</span>
      <span><span class="sw" style="background:#fffbf0;border-color:#f5e0a0"></span>價格變動</span>
    </div>
    <div id="table-area"></div>
  </div>
  <div class="diff-legend" id="diff-legend" style="display:none">
    比對差異：
    <span><span class="sw" style="background:#f2fae8;border-color:#cde9b0"></span>新增</span>
    <span><span class="sw" style="background:#fff4f4;border-color:#f5c5c5"></span>刪除</span>
    <span><span class="sw" style="background:#fffbf0;border-color:#f5e0a0"></span>價格變動</span>
  </div>
  <div id="table-area"></div>
</div>

<div class="mbg" id="mbg" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="mhd">
      <div>
        <div class="mtitle" id="mtitle"></div>
        <div class="msub"   id="msub"></div>
      </div>
      <span class="mclose" onclick="closeM()">×</span>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

      const b2cnt3=it.sec.rows.filter(r=>r.buy2).length;
      return `<div class="ac ac-end" onclick="showM('${it.cat}',${it.idx},'buy2')">
        <div class="ac-tag">🔔 買2特價・今日活動結束</div>
        <div class="ac-title">${it.sec.label||'—'}</div>
        <div class="ac-sub">${it.cat}・結束：${it.sec.endDate}・${b2cnt3}項買2特價</div>
        <div class="ac-hint">點擊查看買2品項 →</div></div>`;
    }
    return '';
  };

  let html='';
  if(startToday.length) html+=`<div class="alert-label"><span class="dot dot-red"></span>今日開始活動（點擊查看品項）</div><div class="alert-grid">${startToday.map(it=>card(it,'today')).join('')}</div>`;
  if(startTmr.length)   html+=`<div class="alert-label"><span class="dot dot-amber"></span>明日開始活動（點擊查看品項）</div><div class="alert-grid">${startTmr.map(it=>card(it,'tmr')).join('')}</div>`;
  if(expiring.length)   html+=`<div class="alert-label"><span class="dot dot-orange"></span>買2特價即將結束（點擊查看品項）</div><div class="alert-grid">${expiring.map(it=>card(it,'exp')).join('')}</div>`;
  if(endToday.length)   html+=`<div class="alert-label"><span class="dot dot-purple"></span>買2特價今日結束！（點擊查看品項）</div><div class="alert-grid">${endToday.map(it=>card(it,'end')).join('')}</div>`;

  document.getElementById('alert-area').innerHTML=html?`<div class="alert-section">${html}</div>`:'';
}

function showM(cat,idx,filterMode){
  const sec=(ALL[curDate][cat]||[])[idx];
  if(!sec)return;
  const rows=filterMode==='buy2'?sec.rows.filter(r=>r.buy2):sec.rows;
  const b2cnt=sec.rows.filter(r=>r.buy2).length;
  document.getElementById('mtitle').textContent=`${cat}｜${sec.label||'—'}`;
  document.getElementById('msub').textContent=
    `促銷期間：${sec.period}　共${sec.rows.length}項`+
    (b2cnt?`　買2特價：${b2cnt}項`:'')+
    (filterMode==='buy2'?'　（僅顯示買2特價品項）':'');
  document.getElementById('mbody').innerHTML=buildTable(rows,false);
  document.getElementById('mbg').classList.add('open');
}
function closeM(){document.getElementById('mbg').classList.remove('open');}

function getDiff(baseRows,cmpRows){
  if(!cmpRows)return baseRows.map(r=>({...r,diff:'same'}));
  const m={};cmpRows.forEach(r=>{m[r.sku||r.name]=r;});
  return baseRows.map(r=>{
    const k=r.sku||r.name,p=m[k];
    if(!p)return{...r,diff:'new'};
    if(p.promo!==r.promo||p.orig!==r.orig)return{...r,diff:'chg',prevOrig:p.orig,prevPromo:p.promo};
    return{...r,diff:'same'};
  });
}
function getDeleted(baseSecs,cmpSecs){
  if(!cmpSecs)return[];
  const keys=new Set(baseSecs.flatMap(s=>s.rows.map(r=>r.sku||r.name)));
  return cmpSecs.flatMap(s=>s.rows.filter(r=>!keys.has(r.sku||r.name)).map(r=>({...r,diff:'del'})));
}

function buildTable(rows,showDiff){
  if(!rows.length)return'<div class="empty">無資料</div>';
  return`<table><thead><tr>
    <th style="width:32px">#</th>
    <th style="width:62px">廠編</th>
    <th style="width:80px">貨號</th>
    <th>品名</th>
    <th style="width:50px;text-align:right">原價</th>
    <th style="width:54px;text-align:right">促銷</th>
    <th style="width:120px">狀態</th>
  </tr></thead><tbody>${rows.map(r=>{
    const cls=r.diff==='new'?'rn':r.diff==='del'?'rd':r.diff==='chg'?'rc':'';
    const pb=r.promo<r.orig?'<span class="badge b-down">降價</span>':r.promo>r.orig?'<span class="badge b-up">調漲</span>':'<span class="badge b-same">持價</span>';
    const db=showDiff?(r.diff==='new'?'<span class="badge b-new">新增</span>':r.diff==='del'?'<span class="badge b-del">刪除</span>':r.diff==='chg'?'<span class="badge b-chg">變動</span>':''):'';
    const b2=r.buy2?`<span class="badge b-buy2">💙買2特$${r.buy2}</span>`:'';
    const b1g1=r.buy1get1?'<span class="badge b-b1g1">🎁買1送1</span>':'';
    const bc=r.cancelBuy2?'<span class="badge b-cancel">取消買2特</span>':'';
    const dn=r.diff==='chg'?`<div class="diff-note">原${r.prevOrig}→${r.prevPromo}</div>`:'';
    return`<tr class="${cls}">
      <td style="color:#ccc;font-size:12px">${r.num}</td>
      <td style="color:#999;font-size:12px">${r.vendor}</td>
      <td style="color:#bbb;font-size:11px">${r.sku}</td>
      <td>${r.name}${dn}</td>
      <td style="text-align:right;color:#999">${r.orig||''}</td>
      <td style="text-align:right;font-weight:600">${r.promo||''}</td>
      <td><div class="badges">${pb}${db}${b2}${b1g1}${bc}</div></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function render(){
  const base=ALL[curDate]||{};
  const cmp=cmpDate?ALL[cmpDate]:null;
  const secs=base[curCat]||[];
  const cmpSecs=cmp?(cmp[curCat]||[]):null;
  const allCmpRows=cmpSecs?cmpSecs.flatMap(s=>s.rows):null;
  const q=document.getElementById('search').value.trim().toLowerCase();
  const hasDiff=!!cmpDate;
  document.getElementById('diff-legend').style.display=hasDiff?'flex':'none';

  let html='';
  if(hasDiff&&(curFilter==='all'||curFilter==='del')){
    const del=getDeleted(secs,cmpSecs).filter(r=>!q||(r.name+r.sku).toLowerCase().includes(q));
    if(del.length) html+=`<div class="tbl-wrap"><div class="sec-hd"><strong style="color:#a32d2d">已刪除品項</strong><span class="sec-cnt">${del.length}項</span></div>${buildTable(del,true)}</div>`;
  }

  secs.forEach(sec=>{
    const diffed=getDiff(sec.rows,allCmpRows);
    const rows=diffed.filter(r=>{
      if(curFilter==='new'  && r.diff!=='new') return false;
      if(curFilter==='del'  && r.diff!=='del') return false;
      if(curFilter==='chg'  && r.diff!=='chg') return false;
      if(curFilter==='buy2' && !r.buy2)        return false;
      if(curFilter==='b1g1' && !r.buy1get1)    return false;
      if(q&&!(r.name+r.sku).toLowerCase().includes(q)) return false;
      return true;
    });
    if(!rows.length)return;
    const b2cnt=rows.filter(r=>r.buy2).length;
    html+=`<div class="tbl-wrap"><div class="sec-hd">
      <strong>${sec.label||'—'}</strong>
      <span class="sec-period">${sec.period}</span>
      ${b2cnt?`<span class="badge b-buy2">💙買2特價 ${b2cnt}項</span>`:''}
      <span class="sec-cnt">${rows.length}項</span>
    </div>${buildTable(rows,hasDiff)}</div>`;
  });

  if(!html) html='<div class="empty">沒有符合條件的品項</div>';
  document.getElementById('table-area').innerHTML=html;
}

function setF(f,btn){curFilter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}

// ── 特價專區 ──────────────────────────────────────────────────────────────
let promoFilter = 'all';

function enterPromo() {
  document.getElementById('promo-zone').style.display = '';
  document.getElementById('normal-zone').style.display = 'none';
  renderPromo();
}
function exitPromo() {
  document.getElementById('promo-zone').style.display = 'none';
  document.getElementById('normal-zone').style.display = '';
}
function setPromoF(f, btn) {
  promoFilter = f;
  document.querySelectorAll('.fb.fp2').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderPromo();
}

function renderPromo() {
  const data = ALL[curDate] || {};
  const q = document.getElementById('promo-search').value.trim().toLowerCase();
  let html = '';
  let totalBuy2 = 0, totalB1G1 = 0;

  // 收集所有分類、所有區段的特價品項
  Object.entries(data).forEach(([cat, secs]) => {
    secs.forEach(sec => {
      const rows = sec.rows.filter(r => {
        const matchBuy2 = r.buy2;
        const matchB1G1 = r.buy1get1;
        if (promoFilter === 'buy2' && !matchBuy2) return false;
        if (promoFilter === 'b1g1' && !matchB1G1) return false;
        if (promoFilter === 'all' && !matchBuy2 && !matchB1G1) return false;
        if (q && !(r.name + r.sku).toLowerCase().includes(q)) return false;
        return true;
      });
      if (!rows.length) return;
      totalBuy2 += rows.filter(r => r.buy2).length;
      totalB1G1 += rows.filter(r => r.buy1get1).length;

      const b2cnt = rows.filter(r => r.buy2).length;
      const b1cnt = rows.filter(r => r.buy1get1).length;
      html += `<div class="tbl-wrap">
        <div class="promo-sec-hd">
          <strong>${cat}</strong>
          <span style="color:#555">${sec.label || '—'}</span>
          <span style="color:#888;font-size:12px">${sec.period}</span>
          ${b2cnt ? `<span class="badge b-buy2">💙買2特 ${b2cnt}項</span>` : ''}
          ${b1cnt ? `<span class="badge b-b1g1">🎁買1送1 ${b1cnt}項</span>` : ''}
          <span class="sec-cnt">${rows.length}項</span>
        </div>
        ${buildTable(rows, false)}</div>`;
    });
  });

  if (!html) {
    html = '<div class="empty">沒有符合條件的特價品項</div>';
  } else {
    // 統計列
    const summary = `<div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div class="tbl-wrap" style="padding:10px 16px;flex:0 0 auto">
        <span style="font-size:20px;font-weight:700;color:#185fa5">${totalBuy2}</span>
        <span style="font-size:11px;color:#888;margin-left:6px">買2特價品項</span>
      </div>
      <div class="tbl-wrap" style="padding:10px 16px;flex:0 0 auto">
        <span style="font-size:20px;font-weight:700;color:#c2410c">${totalB1G1}</span>
        <span style="font-size:11px;color:#888;margin-left:6px">買1送1品項</span>
      </div>
    </div>`;
    html = summary + html;
  }
  document.getElementById('promo-area').innerHTML = html;
}

// 原本的 setF 也要支援 b1g1
const _origSetF = setF;
function setF(f, btn) {
  curFilter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
